name = "remodex-relay-worker"
main = "src/index.js"
compatibility_date = "2026-04-07"

[[durable_objects.bindings]]
name = "SESSION_RELAY_DO"
class_name = "SessionRelayDurableObject"

[[durable_objects.bindings]]
name = "TRUSTED_REGISTRY_DO"
class_name = "TrustedRegistryDurableObject"

[[durable_objects.bindings]]
name = "HEALTH_STATS_DO"
class_name = "HealthStatsDurableObject"

[[durable_objects.bindings]]
name = "PAIRING_CODE_REGISTRY_DO"
class_name = "PairingCodeRegistryDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRelayDurableObject", "TrustedRegistryDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["HealthStatsDurableObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["PairingCodeRegistryDurableObject"]
